{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} ShopCategory | NexusCommerce{% endblock %}
{% block page_title %}{% if editing %}Edit ShopCategory{% else %}New ShopCategory{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Parent</label>
        <input type="text" name="parent" value="{{ record.parent|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Products Count</label>
        <input type="number" name="products_count" value="{{ record.products_count|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Position</label>
        <input type="number" name="position" value="{{ record.position|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="hidden" {% if record.status == 'hidden' %}selected{% endif %}>Hidden</option>
        </select>
      </div>
      <div class="form-group">
        <label>Image Url</label>
        <input type="url" name="image_url" value="{{ record.image_url|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} ShopCategory</button>
      <a href="/shopcategories/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
