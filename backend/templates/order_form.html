{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Order | NexusCommerce{% endblock %}
{% block page_title %}{% if editing %}Edit Order{% else %}New Order{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Order Number</label>
        <input type="text" name="order_number" value="{{ record.order_number|default:'' }}">
      </div>
      <div class="form-group">
        <label>Customer Name</label>
        <input type="text" name="customer_name" value="{{ record.customer_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Customer Email</label>
        <input type="email" name="customer_email" value="{{ record.customer_email|default:'' }}">
      </div>
      <div class="form-group">
        <label>Total</label>
        <input type="number" step="0.01" name="total" value="{{ record.total|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="pending" {% if record.status == 'pending' %}selected{% endif %}>Pending</option>
          <option value="processing" {% if record.status == 'processing' %}selected{% endif %}>Processing</option>
          <option value="shipped" {% if record.status == 'shipped' %}selected{% endif %}>Shipped</option>
          <option value="delivered" {% if record.status == 'delivered' %}selected{% endif %}>Delivered</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
          <option value="returned" {% if record.status == 'returned' %}selected{% endif %}>Returned</option>
        </select>
      </div>
      <div class="form-group">
        <label>Payment Status</label>
        <select name="payment_status">
          <option value="paid" {% if record.payment_status == 'paid' %}selected{% endif %}>Paid</option>
          <option value="unpaid" {% if record.payment_status == 'unpaid' %}selected{% endif %}>Unpaid</option>
          <option value="refunded" {% if record.payment_status == 'refunded' %}selected{% endif %}>Refunded</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Order Date</label>
        <input type="date" name="order_date" value="{{ record.order_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Shipping Address</label>
      <textarea name="shipping_address">{{ record.shipping_address|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Order</button>
      <a href="/orders/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
